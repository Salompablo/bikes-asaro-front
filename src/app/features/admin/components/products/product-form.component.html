<div class="max-w-3xl space-y-6">
    <div class="flex items-center gap-4">
        <a routerLink="/admin/products" class="text-brand-gray hover:text-brand-black transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
        <h2 class="text-2xl font-display tracking-tight text-brand-black">
            {{ isEdit() ? 'Editar producto' : 'Nuevo producto' }}
        </h2>
    </div>

    <form (ngSubmit)="onSubmit()" class="bg-brand-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-5">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
                <label class="admin-label">SKU</label>
                <input type="text" [(ngModel)]="form.sku" name="sku" required class="admin-input"
                    placeholder="MTB-TREK-M5" />
            </div>
            <div>
                <label class="admin-label">Nombre</label>
                <input type="text" [(ngModel)]="form.name" name="name" required class="admin-input"
                    placeholder="Trek Marlin 5" />
            </div>
        </div>

        <div>
            <label class="admin-label">Descripción</label>
            <textarea [(ngModel)]="form.description" name="description" rows="3" class="admin-input"
                placeholder="Descripción del producto..."></textarea>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
            <div>
                <label class="admin-label">Precio</label>
                <input type="number" [(ngModel)]="form.price" name="price" required min="0" step="0.01"
                    class="admin-input" />
            </div>
            <div>
                <label class="admin-label">Stock</label>
                <input type="number" [(ngModel)]="form.stock" name="stock" required min="0" class="admin-input" />
            </div>
            <div>
                <label class="admin-label">Categoría</label>
                <select [(ngModel)]="form.categoryId" name="categoryId" required class="admin-input">
                    <option [ngValue]="0" disabled>Seleccionar...</option>
                    @for (cat of categories(); track cat.id) {
                    <option [ngValue]="cat.id">{{ cat.name }}</option>
                    }
                </select>
            </div>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-5">
            <div>
                <label class="admin-label">Peso (kg)</label>
                <input type="number" [(ngModel)]="form.weight" name="weight" min="0" step="0.1" class="admin-input" />
            </div>
            <div>
                <label class="admin-label">Largo (cm)</label>
                <input type="number" [(ngModel)]="form.length" name="length" min="0" step="0.1" class="admin-input" />
            </div>
            <div>
                <label class="admin-label">Ancho (cm)</label>
                <input type="number" [(ngModel)]="form.width" name="width" min="0" step="0.1" class="admin-input" />
            </div>
            <div>
                <label class="admin-label">Alto (cm)</label>
                <input type="number" [(ngModel)]="form.height" name="height" min="0" step="0.1" class="admin-input" />
            </div>
        </div>

        <!-- Images -->
        <div class="space-y-3">
            <label class="admin-label">Imágenes</label>

            @if (form.images.length > 0) {
            <div class="flex flex-wrap gap-3">
                @for (img of form.images; track $index; let i = $index) {
                <div class="relative w-24 h-24 rounded-lg overflow-hidden border border-gray-200 bg-gray-50"
                    draggable="true" (dragstart)="onImageDragStart(i)" (dragover)="onImageDragOver($event, i)"
                    (drop)="onImageDrop(i)" (dragend)="onImageDragEnd()" [class.opacity-60]="draggedImageIndex() === i"
                    [class.ring-2]="dragOverIndex() === i" [class.ring-brand-accent]="dragOverIndex() === i">
                    <img [src]="normalizeImageUrl(img)" (error)="onPreviewImageError($event)" alt="Producto"
                        class="w-full h-full object-cover" />
                    <button type="button" (click)="removeImage(i)"
                        class="absolute top-1 right-1 w-6 h-6 rounded-full bg-brand-black/80 text-white text-[10px] font-bold flex items-center justify-center hover:bg-red-600 transition-colors"
                        aria-label="Quitar imagen">
                        X
                    </button>
                </div>
                }
            </div>
            <p class="text-xs text-brand-gray">Arrastrá las miniaturas para cambiar su orden.</p>
            }

            <div class="flex items-center gap-3">
                <label
                    class="cursor-pointer bg-gray-100 hover:bg-gray-200 text-brand-gray px-4 py-2 rounded-lg text-sm font-display uppercase tracking-wider transition-colors">
                    {{ uploading() ? 'Subiendo...' : 'Subir imagen' }}
                    <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)"
                        [disabled]="uploading()" />
                </label>
                @if (uploading()) {
                <span class="text-sm text-brand-gray">Subiendo archivo...</span>
                }
            </div>
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit" [disabled]="saving()"
                class="bg-brand-black text-brand-white px-6 py-2.5 rounded-lg font-display text-sm uppercase tracking-wider hover:bg-brand-dark disabled:opacity-50 transition-colors">
                {{ saving() ? 'Guardando...' : (isEdit() ? 'Actualizar' : 'Crear producto') }}
            </button>
            <a routerLink="/admin/products"
                class="text-brand-gray hover:text-brand-black text-sm font-display uppercase tracking-wider transition-colors">
                Cancelar
            </a>
        </div>
    </form>
</div>
