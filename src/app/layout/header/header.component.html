<header class="w-full bg-brand-black border-b-4 border-brand-accent sticky top-0 z-50">
    <div class="w-full px-3 sm:px-6 lg:px-10 xl:px-14">
        <div class="relative h-20">
            @if (!isSearchOpen) {
            <div class="grid grid-cols-[auto_1fr_auto] items-center gap-4 h-full">
                <a class="flex items-center justify-start" routerLink="/" aria-label="Ir al inicio">
                    <img src="assets/images/bikes-asaro-logo.png" alt="Bikes Asaro" class="brand-logo" loading="eager"
                        decoding="async" />
                </a>

                <nav class="hidden md:flex justify-center items-center gap-12 lg:gap-16">
                    <a routerLink="/catalog"
                        class="nav-link text-brand-silver font-display uppercase tracking-widest text-sm font-bold px-2 lg:px-3">Productos</a>
                    <a routerLink="/contacto"
                        class="nav-link text-brand-silver font-display uppercase tracking-widest text-sm font-bold px-2 lg:px-3">Contacto</a>
                </nav>

                <div class="header-actions flex items-center justify-end">
                    <button type="button" class="icon-button text-brand-silver hover:text-brand-white"
                        (click)="openSearch()" aria-label="Buscar productos">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-4.35-4.35M10.8 18a7.2 7.2 0 100-14.4 7.2 7.2 0 000 14.4z"></path>
                        </svg>
                    </button>

                    <div class="account-trigger-wrap">
                        <button type="button" class="icon-button text-brand-silver hover:text-brand-white"
                            (click)="toggleAccountMenu()" [attr.aria-expanded]="isAccountMenuOpen" aria-haspopup="menu"
                            aria-label="Cuenta">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </button>

                        @if (isAccountMenuOpen) {
                        <div class="account-menu" role="menu" aria-label="Opciones de cuenta">
                            <button type="button" class="account-menu-item" role="menuitem">Mis ordenes</button>
                            <button type="button" class="account-menu-item" role="menuitem">Desconectar</button>
                        </div>
                        }
                    </div>

                    <button routerLink="/carrito" type="button"
                        class="relative icon-button text-brand-silver hover:text-brand-white group"
                        aria-label="Carrito">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                            </path>
                        </svg>

                        @if (cartState.totalItems() > 0) {
                        <span
                            class="absolute -top-2 -right-2 inline-flex items-center justify-center w-5 h-5 text-xs font-black text-brand-black bg-brand-accent rounded-full border-2 border-brand-black group-hover:scale-110 transition-transform duration-200">
                            {{ cartState.totalItems() }}
                        </span>
                        }
                    </button>

                    <button type="button"
                        class="icon-button mobile-menu-toggle text-brand-silver hover:text-brand-white"
                        aria-label="Abrir menu movil">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16m-7 6h7"></path>
                        </svg>
                    </button>
                </div>
            </div>
            }

            <div class="search-shell" [class.search-shell--open]="isSearchOpen" [attr.aria-hidden]="!isSearchOpen">
                <div class="search-shell-inner">
                    <svg class="w-5 h-5 text-brand-silver" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-4.35-4.35M10.8 18a7.2 7.2 0 100-14.4 7.2 7.2 0 000 14.4z"></path>
                    </svg>
                    <input #searchInput type="search" class="search-input"
                        placeholder="Buscar productos, marcas y categorias" aria-label="Buscar productos" />
                    <button type="button" class="search-close" (click)="closeSearch()" aria-label="Cerrar busqueda">
                        Esc
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>
