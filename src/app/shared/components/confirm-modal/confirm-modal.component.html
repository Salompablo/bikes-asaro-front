@if (visible()) {
<div class="fixed inset-0 z-50 flex items-center justify-center">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" (click)="onCancel()"></div>

    <!-- Modal -->
    <div
        class="relative bg-brand-white rounded-2xl shadow-xl border border-gray-200 p-6 w-full max-w-md mx-4 animate-modal-in">
        <h3 class="text-lg font-display tracking-tight text-brand-black">{{ title() }}</h3>
        <p class="mt-2 text-sm text-brand-gray leading-relaxed">{{ message() }}</p>

        <div class="mt-6 flex items-center justify-end gap-3">
            <button (click)="onCancel()"
                class="px-4 py-2 rounded-lg text-sm font-display uppercase tracking-wider border border-gray-300 text-brand-gray hover:bg-gray-100 transition-colors">
                Cancelar
            </button>
            <button (click)="onConfirm()"
                class="px-4 py-2 rounded-lg text-sm font-display uppercase tracking-wider text-white transition-colors"
                [class]="variant() === 'destructive' ? 'bg-red-600 hover:bg-red-700' : 'bg-green-600 hover:bg-green-700'">
                {{ confirmText() }}
            </button>
        </div>
    </div>
</div>
}
